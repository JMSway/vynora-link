<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Damir · Links</title>
  <meta name="description" content="Marketing для языковых школ. AI, продукты, техно.">
  <meta property="og:title" content="Damir · Links">
  <meta property="og:description" content="Marketing для языковых школ. AI, продукты, техно.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0F0E0C">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎯%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0F0E0C;
      --bg-secondary: #1A1814;
      --bg-tertiary: #252219;

      --accent: #E8651A;
      --accent-hover: #FF7A2E;
      --accent-dim: #C25516;

      --text-primary: #F5EFE4;
      --text-secondary: #B8AE9E;
      --text-tertiary: #7A7166;

      --border: rgba(245, 239, 228, 0.08);

      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;

      --font-display: 'Clash Display', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-size-adjust: 100%;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl) var(--space-md);
    }

    main {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 36px;
      color: var(--accent);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-md);
    }

    .bio {
      font-size: 16px;
      color: var(--text-primary);
      text-align: center;
      max-width: 340px;
      margin-bottom: var(--space-2xl);
    }

    nav {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .link {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      width: 100%;
      min-height: 56px;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid var(--border);
      transition: background 200ms ease, border-color 200ms ease, transform 100ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
    }

    .link:active {
      transform: scale(0.98);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .link--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0F0E0C;
      box-shadow: 0 4px 20px rgba(232, 101, 26, 0.2);
    }

    .link--primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .link--primary:active {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
    }

    .link__icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    .link--primary .link__icon {
      color: var(--bg-primary);
    }

    .link__icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    .link__icon svg[data-stroke] {
      fill: none;
      stroke: currentColor;
    }

    .link__body {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
      flex: 1;
      min-width: 0;
    }

    .link__title {
      font-weight: 600;
      font-size: 15px;
    }

    .link--primary .link__title {
      font-weight: 600;
    }

    .link__subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .link--primary .link__subtitle {
      color: rgba(15, 14, 12, 0.7);
    }

    footer {
      margin-top: var(--space-2xl);
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 200ms ease;
    }

    footer a:hover {
      color: var(--accent);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="avatar" aria-label="Damir Abdimanapov">
      <img src="assets/avatar.jpg" alt="Damir Abdimanapov" onerror="this.style.display='none';this.parentElement.textContent='D'">
    </div>

    <h1 class="name">Damir</h1>
    <p class="bio">Marketing для языковых школ и ЕНТ-центров. Параллельно строю с AI и веду блог о технологиях.</p>

    <nav aria-label="Мои ссылки">
      <a class="link link--primary" href="https://growup-system.pages.dev" target="_blank" rel="noopener noreferrer">
        <span class="link__icon" aria-hidden="true">
          <svg data-stroke xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        </span>
        <span class="link__body">
          <span class="link__title">Grow Up</span>
          <span class="link__subtitle">Система для языковых школ</span>
        </span>
      </a>

      <a class="link" href="https://www.linkedin.com/in/abdimanapovda" target="_blank" rel="noopener noreferrer" onclick="openExternalLink('https://www.linkedin.com/in/abdimanapovda', 'linkedin://in/abdimanapovda'); return false;">
        <span class="link__icon" aria-hidden="true">
          <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-label="LinkedIn"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </span>
        <span class="link__body">
          <span class="link__title">LinkedIn</span>
          <span class="link__subtitle">AI, продукты, техно</span>
        </span>
      </a>

    </nav>
  </main>

  <footer>
    <a href="https://www.anthropic.com/claude-code" target="_blank" rel="noopener noreferrer">Made with Claude Code</a>
  </footer>

  <script>
    // Opens a link via native app deep link first, falling back to web URL
    // after a short delay if the app isn't installed. See CLAUDE.md §13.
    function openExternalLink(webUrl, deepLinkUrl) {
      if (deepLinkUrl) {
        window.location.href = deepLinkUrl;
        setTimeout(() => {
          window.open(webUrl, '_blank', 'noopener,noreferrer');
        }, 500);
      } else {
        window.open(webUrl, '_blank', 'noopener,noreferrer');
      }
    }
  </script>
</body>
</html>

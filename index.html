<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Damir" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- SEO & social -->
  <title>Damir Abdimanapov - Marketing and AI</title>
  <meta name="description" content="Практикую маркетинг для языковых школ и образовательных центров, параллельно веду блог об AI и технологиях" />
  <meta name="theme-color" content="#0F0E0C" />
  <meta property="og:title" content="Damir Abdimanapov - Marketing and AI" />
  <meta property="og:description" content="Практикую маркетинг для языковых школ и образовательных центров, параллельно веду блог об AI и технологиях" />
  <meta property="og:image" content="/web-app-manifest-512x512.png" />
  <meta property="og:url" content="https://abdimanapov.pages.dev" />
  <meta property="og:type" content="website" />
  <meta property="twitter:card" content="summary" />
  <meta property="twitter:title" content="Damir Abdimanapov - Marketing and AI" />
  <meta property="twitter:image" content="/web-app-manifest-512x512.png" />
  <link rel="canonical" href="https://abdimanapov.pages.dev" />

  <!-- Preload critical assets so they fetch in parallel with HTML parsing -->
  <link rel="preload" href="/assets/image/avatar.webp" as="image" type="image/webp" />
  <link rel="preload" href="/styles/tokens.css" as="style" />
  <link rel="preload" href="/styles/base.css" as="style" />

  <!-- Preconnect for faster font handshake -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

  <!-- Critical CSS inline: paint instantly without FOUC -->
  <style>
    :root {
      --bg-primary: #0F0E0C;
      --text-primary: #F5EFE4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse 1200px 800px at 50% 0%, #1A1814 0%, #0F0E0C 45%, #07060A 100%);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(32px, 8vw, 64px) clamp(20px, 5vw, 32px);
    }
  </style>

  <!-- Async-load fonts via media-print trick -->
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&display=swap" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" />
  </noscript>

  <!-- Cascade order matters: tokens → base → components → layout -->
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <link rel="stylesheet" href="/styles/layout.css" />
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>

  <a class="brand-mark" href="/" aria-label="Damir Abdimanapov">
    <svg viewBox="0 0 120 120" width="32" height="32" aria-hidden="true">
      <line x1="35" y1="80" x2="85" y2="40" stroke="#E8651A" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
      <circle cx="35" cy="80" r="6" fill="#E8651A" opacity="0.6"/>
      <circle cx="85" cy="40" r="10" fill="#E8651A" opacity="0.6"/>
    </svg>
  </a>

  <main class="main-container">

    <div class="profile-block">
      <div class="avatar" aria-label="Damir Abdimanapov">
        <picture>
          <source type="image/webp"
                  srcset="/assets/image/avatar.webp 1x, /assets/image/avatar@2x.webp 2x" />
          <img src="/assets/image/avatar.jpg"
               srcset="/assets/image/avatar.jpg 1x, /assets/image/avatar@2x.jpg 2x"
               alt="Damir Abdimanapov"
               width="104" height="104"
               decoding="async"
               onerror="this.parentElement.replaceWith(Object.assign(document.createElement('span'),{className:'avatar-initial',textContent:'D'}))" />
        </picture>
      </div>

      <h1 class="profile-name">Damir</h1>

      <p class="profile-bio">Практикую маркетинг для&nbsp;языковых школ и&nbsp;образовательных центров, параллельно веду блог об&nbsp;AI и&nbsp;технологиях</p>
    </div>

    <nav class="links-block" aria-label="Мои ссылки">

      <a href="https://growup-system.pages.dev"
         target="_blank"
         rel="noopener noreferrer"
         class="button button-primary"
         aria-label="Grow Up — система для языковых школ">
        <span class="button-icon" aria-hidden="true">
          <svg data-stroke xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17L9 11L13 15L21 7"/><path d="M14 7L21 7L21 14"/></svg>
        </span>
        <span class="button-content">
          <span class="button-title">Grow Up</span>
          <span class="button-subtitle">Система для&nbsp;языковых школ</span>
        </span>
      </a>

      <a href="https://www.linkedin.com/in/abdimanapovda"
         target="_blank"
         rel="noopener noreferrer"
         class="button button-secondary"
         aria-label="LinkedIn — AI, продукты, техно">
        <span class="button-icon" aria-hidden="true">
          <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </span>
        <span class="button-content">
          <span class="button-title">LinkedIn</span>
          <span class="button-subtitle">AI, продукты, техно</span>
        </span>
      </a>

    </nav>
  </main>

  <footer class="footer-block">
    <p class="footer-text">
      Made with&nbsp;<a href="https://www.anthropic.com/claude-code"
         target="_blank"
         rel="noopener noreferrer"
         class="footer-link">Claude&nbsp;Code</a>
    </p>
  </footer>

  <script src="/scripts/main.js" defer></script>
</body>
</html>

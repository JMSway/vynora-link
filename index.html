  <style>
    :root {
      --bg-primary: #0F0E0C;
      --bg-secondary: #1A1814;
      --bg-tertiary: #252219;

      --accent: #E8651A;
      --accent-hover: #FF7A2E;
      --accent-dim: #C25516;

      --text-primary: #F5EFE4;
      --text-secondary: #B8AE9E;
      --text-tertiary: #7A7166;

      --border: rgba(245, 239, 228, 0.08);

      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;

      --font-display: 'Clash Display', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-size-adjust: 100%;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-2xl) var(--space-md);
    }

    main {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 36px;
      color: var(--accent);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-xs);
    }

    .meta {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }

    .bio {
      font-size: 16px;
      color: var(--text-primary);
      text-align: center;
      max-width: 320px;
      margin-bottom: var(--space-xl);
    }

    nav {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .link {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      width: 100%;
      min-height: 56px;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid var(--border);
      transition: background 200ms ease, border-color 200ms ease, transform 100ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
    }

    .link:active {
      transform: scale(0.98);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .link--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0F0E0C;
      box-shadow: 0 4px 20px rgba(232, 101, 26, 0.2);
    }

    .link--primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .link--primary:active {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
    }

    .link__icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    .link--primary .link__icon {
      color: var(--bg-primary);
    }

    .link__icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    .link__icon svg[data-stroke] {
      fill: none;
      stroke: currentColor;
    }

    .link__body {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
      flex: 1;
      min-width: 0;
    }

    .link__title {
      font-weight: 600;
      font-size: 15px;
    }

    .link--primary .link__title {
      font-weight: 600;
    }

    .link__subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .link--primary .link__subtitle {
      color: rgba(15, 14, 12, 0.7);
    }

    footer {
      margin-top: var(--space-2xl);
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 200ms ease, border-color 200ms ease;
    }

    footer a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
